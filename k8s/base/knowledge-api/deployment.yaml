apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-api
  labels:
    app: knowledge-api
spec:
  selector:
    matchLabels:
      app: knowledge-api
  template:
    metadata:
      labels:
        app: knowledge-api
    spec:
      containers:
        - name: knowledge-api
          image: enterprise-rag-platform:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: knowledge-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
