apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - knowledge-api
              topologyKey: kubernetes.io/hostname
      containers:
        - name: knowledge-api
          env:
            - name: ENVIRONMENT
              value: "production"
