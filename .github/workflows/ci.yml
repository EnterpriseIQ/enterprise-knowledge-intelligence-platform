name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Force offline embeddings so CI is deterministic and does not depend on the
# Hugging Face Hub: the platform automatically uses its hashing-embedder fallback.
env:
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff, non-blocking)
        run: ruff check src tests data || true

      - name: Generate synthetic corpus
        run: python -m data.generate_data

      - name: Run test suite
        run: python -m pytest -q

      - name: Smoke-test the demo
        run: python run_demo.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t enterprise-rag-platform:ci .
      - name: Start container and check /health
        run: |
          docker run -d --rm -p 8000:8000 --name erag enterprise-rag-platform:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then echo "healthy"; break; fi
            sleep 3
          done
          curl -fsS http://localhost:8000/health
          docker stop erag
